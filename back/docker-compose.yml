services:
  postgres:
    image: postgres:15-alpine
    container_name: lootopia_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: lootopia_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: